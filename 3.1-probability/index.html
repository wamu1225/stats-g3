    <h1>確率の基礎と確率分布</h1>
    <p>💡 **このモジュールで学ぶこと**

データを元にした推測の土台となるのが「確率」です。3級では複雑な公式は要求されませんが、確率の基本定理（加法定理・乗法定理）を迷わず使えることと、標準正規分布を用いた確率の計算（Zスコア）が完璧にできることが最も重要になります。

---

### 1. 事象と確率の基本規則

サイコロやコインの確率を計算するためのルールです。

- **排反（はいはん）**
  2つの事象が「絶対に同時に起こらない」こと（例：サイコロで偶数の目と奇数の目が同時に出ること）。このとき、どちらかが起こる確率は単純に足し算できます（**加法定理**）。
   P(A \text{ または } B) = P(A) + P(B) 
  もし排反でない（同時に起こり得る共有部分がある）場合は、ダブルカウントを防ぐために引く必要があります。
   P(A \cup B) = P(A) + P(B) - P(A \cap B) 

- **独立（どくりつ）**
