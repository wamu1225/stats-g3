    <p>💡 **このモジュールで学ぶこと**

「この薬を飲んだ群と飲まなかった群で血圧に差があるか？」——研究者はこのような問いに統計的な根拠で答えなければなりません。感覚的に「下がった気がする」だけでは科学的な証拠になりません。**仮説検定**は「偶然そうなる可能性はどれくらいか」を定量的に評価し、「統計的に有意な差がある」と言えるかどうかを判断する手続きです。その論理の流れ（背理法的な考え方）を丁寧に理解しましょう。

### 1. 仮説検定の枠組み：「まず疑ってかかる」

仮説検定は「証明したいことの反対をまず仮定し、データがその仮定と矛盾するかを確認する」という背理法的な手続きです。

**帰無仮説 $H_0$**：棄却を目指す仮説。「薬に効果はない（血圧は変わらない）」「2つの群の平均は等しい」など、「差なし・効果なし」の主張。

**対立仮説 $H_1$**：証明したい主張。「薬に効果がある（血圧が下がる）」など。
