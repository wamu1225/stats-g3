    <h1>仮説検定</h1>
    <p>このモジュールで学ぶこと

「この薬を飲んだ群と飲まなかった群で血圧に差があるか？」——研究者はこのような問いに統計的な根拠で答えなければなりません。感覚的に「下がった気がする」だけでは科学的な証拠になりません。仮説検定は「偶然そうなる可能性はどれくらいか」を定量的に評価し、「統計的に有意な差がある」と言えるかどうかを判断する手続きです。その論理の流れ（背理法的な考え方）を丁寧に理解しましょう。

t分布のグラフで棄却域（両側の赤い領域）と検定統計量の位置関係を視覚的に確認してください。

仮説検定の枠組み：「まず疑ってかかる」

仮説検定は一種の「消去法」です。「薬は効かない（血圧は変わらない）」という仮定から始め——「もしこの仮定が正しいなら、こんな大きな差が偶然起きる確率はほとんどゼロのはずだ。でも実際に起きた。だから仮定が間違っていた」と結論する考え方です。証明したいことの反対を仮...</p>
