    <h1>データの可視化</h1>
    <p>💡 **このモジュールで学ぶこと**

「数値の表を眺めているだけでは気づかなかったことが、グラフを描いた瞬間に見えてくる」——これがデータ可視化の醍醐味です。たとえば100人分の身長データが数字の羅列として並んでいても、分布の形・外れ値の存在・2つの変数の関係は一目ではわかりません。適切なグラフを選んで描くことで、データが「語りかけてくる」ようになります。どのグラフがどんな問いに答えるのかを、具体的な場面と合わせて学びましょう。

---

### 1. ヒストグラム：分布の「形」を読む

50人のクラスのテスト点数を分析するとします。データを「0〜9点」「10〜19点」...「90〜100点」のような等幅の区間（**階級**または**ビン**）に分け、各階級に何人いるかを棒の高さで表したグラフが**ヒストグラム**です。

ヒストグラムを描くと、分布の「形状」が見えてきます。

- **左右対称（山型）**：多くの人が平均点付近に集中している標準的な状態。
- **右裾が長い（右歪み）**：ほとんどの人が低得点だが、少数の高得点者がいる状態。年収分布の典型例です。
