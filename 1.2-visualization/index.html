    <h1>データの可視化</h1>
    <p>💡 **このモジュールで学ぶこと**

「数値の表を眺めているだけでは気づかなかったことが、グラフを描いた瞬間に見えてくる」——これがデータ可視化の醍醐味です。たとえば100人分の身長データが数字の羅列として並んでいても、分布の形・外れ値の存在・2つの変数の関係は一目ではわかりません。適切なグラフを選んで描くことで、データが「語りかけてくる」ようになります。どのグラフがどんな問いに答えるのかを、具体的な場面と合わせて学びましょう。

---

### 1. 基本的な統計グラフ：目的に合わせて選ぶ

統計グラフは「何を伝えたいか」によって使い分けます。グラフの種類を間違えると、データの特徴が正確に伝わりません。試験では「このデータにはどのグラフが適切か」という問いが頻出です。
