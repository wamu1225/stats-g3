    <h1>中心極限定理と二項分布の正規近似</h1>
    <p>このモジュールで学ぶこと

Chapter 4 では「標本から母集団を推測する」方法を学びます。でも、なぜそんなことが可能なのでしょうか？

その根拠となる定理が中心極限定理（CLT）です。「母集団がどんな形の分布でも、サンプルサイズが大きければ標本平均の分布は正規分布で近似できる」という驚くべき事実です。正規分布で近似できるから確率計算ができる——だから推定や仮説検定が成り立ちます。

まず直感から——「平均を取ると安定する」

1つのサイコロを1回振ると、出る目は1〜6のどれか。バラツキが大きいです。

では、10人それぞれがサイコロを1回ずつ振って10人の平均を求めたらどうなるでしょう？ 1人だけが「6」を出しても、他の9人の目が平均的なら、10人の平均は大きく外れません。さらに100人の平均を取れば、もっと安定します。

人数が増えるほど、極端な値が打ち消し合い、平均はブレにくくな...</p>
