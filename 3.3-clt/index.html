    <p>このモジュールで学ぶこと

Chapter 4 では「標本から母集団を推測する」方法を学びます。でも、なぜそんなことが可能なのでしょうか？

その根拠となる2つの考え方を、このモジュールで学びます。

大数の法則：サンプルを増やすほど、標本平均は母平均（真の値）に近づいていく。
中心極限定理（CLT）：その標本平均の分布は、母集団の形に関わらず、正規分布になる。

大数の法則——「くり返せば真値に近づく」
