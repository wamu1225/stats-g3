    <h1>大数の法則と中心極限定理</h1>
    <p>💡 **このモジュールで学ぶこと**

前のモジュールで正規分布と標準化を学びました。正規分布は身長や試験点数に自然に現れますが、実は「どんな分布でも、大きな標本を取り続けると正規分布に近づく」という驚くべき定理があります。これが**中心極限定理（CLT）**です。この定理があるからこそ、Chapter 4で学ぶ信頼区間や仮説検定が成り立ちます。

---

### 1. 大数の法則と中心極限定理

**大数の法則（Law of Large Numbers）** は「標本サイズ $n$ を大きくすると、標本平均 $\bar{X}_n$ が母平均 $\mu$ に確率収束する」という定理です。

\bar{X}_n = \frac{X_1 + X_2 + \cdots + X_n}{n} \xrightarrow{n \to \infty} \mu

コインを10回投げると表の割合がかなりばらつきますが、1000回・10000回と増やすと割合は 0.5 に近づいていきます——これが大数の法則の直感です。「多く集めるほど真の値に近づく」という標本調査の根拠でもあります。
