    <h1>離散型確率分布</h1>
    <p>💡 **このモジュールで学ぶこと**

「サイコロの目」「コインを10回投げたときの表の枚数」「1時間にコールセンターにかかってくる電話の件数」——これらはどれも整数値（0, 1, 2, ...）をとる**離散型確率変数**です。このような確率変数の分布を扱うのが離散型確率分布の理論です。代表的な二項分布とポアソン分布の性質と公式を、具体的な計算例を通して習得しましょう。

---

### 1. 確率変数・確率質量関数・期待値

サイコロを1回振る試行を考えます。結果（出た目）は試行するまでわかりませんが、1〜6のどれかになることはわかっています。このように「試行の結果によって値が決まる変数」を**確率変数**といいます。サイコロの出た目 $X$ は $\{1, 2, 3, 4, 5, 6\}$ の整数値をとる**離散型確率変数**です。

各値が起こる確率をまとめた関数を**確率質量関数（PMF: Probability Mass Function）**といいます。公正なサイコロでは $P(X=1) = P(X=2) = \cdots = P(X=6) = 1/6$ です。PMF...</p>
