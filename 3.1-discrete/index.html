    <h1>離散型確率分布</h1>
    <p>💡 **このモジュールで学ぶこと**

前のChapterでは「確率とは何か」「条件付き確率・ベイズの定理」を学びました。確率とは「事象に割り当てた数値」でしたが、ここからは一歩進んで「試行の**結果**に数値を割り当てた変数」——**確率変数**を扱います。確率変数を使うことで「コインを10回投げたときの表の回数の分布はどんな形か」「平均は何回か」を計算できるようになります。

「サイコロの目」「コインを10回投げたときの表の枚数」「1時間にコールセンターにかかってくる電話の件数」——これらはどれも整数値（0, 1, 2, ...）をとる**離散型確率変数**です。このような確率変数の分布を扱うのが離散型確率分布の理論です。代表的な二項分布とポアソン分布の性質と公式を、具体的な計算例を通して習得しましょう。
