    <h1>推測統計の入門</h1>
    <p>💡 **このモジュールで学ぶこと**

「100人にアンケートをとったら支持率は40%だった。では全国での実際の支持率は40%だと言い切ってよいだろうか？」
このように、手元の「標本（サンプル）」から見えない「母集団全体」の真実を確率的に予測するのが**推測統計**です。3級では複雑な公式の丸暗記は求められません。実際のデータ分析で使われる「区間推定」と「仮説検定」の考え方を学びます。

---

### 1. 母集団と標本・2つの大定理

- **母集団**：知りたい対象の全体像。その中にある本当の平均や比率のことを**母数（パラメーター）**と呼びます。
- **標本**：調査のために選び出された一部。ここから計算された平均や比率のことを統計量と呼びます。

標本を抽出するたびに、調査結果は微妙に揺れ動きます。これを標本誤差といいます。しかし、標本のサイズ（数）を増やすことで真実に近づいていく性質があり、これを支える2つの数学の定理があります。

1. **大数の法則（たいすうのほうそく）**：標本サイズ $n$ を大きくすればするほど、標本の平均は母集団の真の平均に限りなく近づ...</p>
