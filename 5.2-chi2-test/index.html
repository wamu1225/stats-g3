    <h1>カイ二乗検定</h1>
    <p>このモジュールで学ぶこと

「サイコロは本当に1〜6が等しく出るのか？」「性別とコーヒーの好みに関係があるか？」——この2つは一見似ているようで、実は異なる問いです。前者は「ある分布に従うか」を検定する適合度検定、後者は「2つのカテゴリ変数が独立か」を検定する独立性の検定です。どちらも （カイ二乗）統計量を使いますが、自由度の求め方と期待度数の計算が異なります。この違いを中心に学びましょう。

カイ二乗統計量：「観測と期待のずれ」を測る

サイコロを600回振って「1〜6が各100回ずつ出れば公正」が期待値です。実際に振ったら「1が85回、2が110回...」と多少のズレが生じました。このズレが「偶然の範囲内か、不公正の証拠か」を判断するのがカイ二乗検定です。

観測度数 ：実際に観測された各カテゴリの件数。
期待度数 ：帰無仮説が正しいと仮定したときに期待される件数。
