    <h1>推定</h1>
    <p>💡 **このモジュールで学ぶこと**

「スプーン1杯の味見で鍋全体の塩加減を当てる」——これが推定の本質です。鍋全体（母集団）を全部飲み干さなくても、1杯（標本）を味見するだけで全体の味を推測できます。統計的推定とは、標本から得られた情報を使って、観測できない母集団の特性（母平均 $\mu$ や母分散 $\sigma^2$）を推測することです。点推定・区間推定・信頼区間という3つの概念を、具体的な場面とともに理解しましょう。

---

### 1. 点推定：1つの数値で母数を推測する

クラス30人の身長を測り、標本平均 $\bar{X} = 168$ cmを計算しました。これを「全国の高校男子の平均身長（母平均 $\mu$）の推定値は168cm」と報告するのが**点推定**です。1つの数値で母数を推測します。
