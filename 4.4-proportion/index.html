    <h1>母比率の推定・検定</h1>
    <p>💡 **このモジュールで学ぶこと**

モジュール 4.1〜4.3 では「連続型の量的データ（身長・血圧・点数など）の平均」を推定・検定してきました。今回はデータの種類が変わります——「成功か失敗か」という**2値データ**では、関心のある母数が「平均」ではなく**母比率 $p$**（成功の割合）です。基本的な考え方は同じですが、使う分布が正規分布に近似された比率の分布になります。

「この薬の治癒率は本当に50%より高いか？」「A社とB社の商品の不良品率に差があるか？」——結果が「成功か失敗か（治癒した・しない、不良品・良品）」という2値データでは、関心のある母数は**母比率** $p$（母集団における成功の割合）です。母平均の推定・検定と同様の考え方で、母比率の信頼区間と仮説検定を構築できます。

---

### 1. 母比率の点推定と区間推定

$n$ 個の独立な試行で成功が $X$ 回だったとします。**標本比率** $\hat{p} = X/n$ は母比率 $p$ の不偏推定量です。

$X \sim B(n, p)$（二項分布）なので $E[\hat{p}] = p$、...</p>
