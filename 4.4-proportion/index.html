### 1. 母比率の点推定と区間推定

$n$ 個の独立な試行で成功が $X$ 回だったとします。**標本比率** $\hat{p} = X/n$ は母比率 $p$ の不偏推定量です。

\hat{p} \approx N\!\left(p,\; \frac{p(1-p)}{n}\right)
