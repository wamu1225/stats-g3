    <h1>データの記述と要約（1変数）</h1>
    <p>💡 **このモジュールで学ぶこと**

集まった大量のデータを要約し、特徴を掴むのが「**記述統計**」の基本です。
まずデータの性質（数なのか記号なのか）を見極める「尺度」を理解し、その後でデータの中心を表す「代表値」と、ばらつきを表す「散布度」の計算方法をマスターしましょう。

---

### 1. データの種類と4つの尺度

データは**質的データ（カテゴリや分類）**と**量的データ（数値）**に分かれます。さらに細かく4つの「尺度水準」に分類されます。

1. **名義尺度**：分類するためだけに付けられた記号（例：性別、血液型、郵便番号）。度数のカウントは可能ですが、順序や計算には意味がありません。
2. **順序尺度**：大小や順序には意味があるが、間隔は均等ではない値（例：アンケートの5段階評価、徒競走の順位）。中央値を取ることはできます。
3. **間隔尺度**：値の差（間隔）には意味があるが、「絶対的なゼロ」が存在しない値（例：気温（摂氏℃）、西暦）。20℃は10℃の2倍の熱量を持っていません。足し算・引き算が可能です。
