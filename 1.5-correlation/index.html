    <h1>散布図・相関・クロス集計</h1>
    <p>このモジュールで学ぶこと

前のモジュールではヒストグラムや箱ひげ図で「1つの変数の分布」を見ました。では「2つの変数の関係」はどうやって可視化するのでしょうか。「勉強時間が長いほどテストの点は高いのか？」「性別によってコーヒーの好みに違いはあるか？」——このような問いに答えるのがこのモジュールで学ぶツールです。

散布図と相関係数：2変数の量的関係を見る

2つの量的変数の関係を視覚化するツールが散布図です。「広告費（X軸）と売上（Y軸）」「勉強時間（X軸）とテスト点数（Y軸）」のように、各データ点を平面上の1点として打ちます。

散布図から読み取れる関係の種類：

正の相関：右上がりの点の群。広告費が多いほど売上も多い。
負の相関：右下がりの点の群。気温が下がるほどコーヒーの販売量が増える。
無相関：点がランダムに散らばる。靴のサイズと英語の成績には関係がない。

共分散：2変数が同じ...</p>
