    <h1>ベイズの定理</h1>
    <p>💡 **このモジュールで学ぶこと**

前のモジュールでは、条件付き確率 $P(A|B)$（B が起きたときに A が起きる確率）を学びました。ベイズの定理はこれを**逆向き**に使います——「結果（B）が観測されたとき、原因（A）の確率はいくつか？」を求める考え方です。

「検査で陽性反応が出ました。本当に病気の確率は何%でしょうか？」——多くの人は「90%以上」と直感的に答えますが、実際の答えはずっと低いことがあります。その理由を説明するのがベイズの定理です。「データを見る前の信念（事前確率）」に「新しいデータ」を組み合わせて「更新された信念（事後確率）」を求める——このベイズ更新の考え方は、医療診断・迷惑メールフィルター・気象予報など幅広い場面に応用されています。

---

### 1. 全確率の公式：「原因ごとに分解して合算する」

工場の例で考えましょう。製品の60%を工場X、40%を工場Yが生産しており、不良率はXが2%、Yが5%です。「ランダムに選んだ1つの製品が不良品である確率」を求めるにはどうすればよいでしょうか。

製品の出所（工場X or Y）が「原因」、不良...</p>
