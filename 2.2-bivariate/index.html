    <p>💡 **このモジュールで学ぶこと**

「勉強時間とテストの点数に関係はあるか」「性別によって好みの製品機能に違いはあるか」。このように、2つのデータの関連性を調べるアプローチを学びます。量的データの関係を見る「散布図」「相関係数」「回帰分析」、質的データの関係を見る「クロス集計表」は、実務でも非常によく使われる基礎スキルです。

---

### 1. 散布図と相関係数（量的データの関係）

2つの量的データ（例：身長と体重）それぞれの値を座標平面に打ったグラフを**散布図**といいます。
散布図の形状から、一方が増えるともう一方も増える傾向（**正の相関**）や、一方が増えると一方が減る傾向（**負の相関**）を視覚的に把握できます。

直線的な関係性の強さを $-1$ から $1$ までの数値で表したものが**ピアソンの積率相関係数（$r$）**です。
- $r = 1$：完全な正の相関（すべての点が一直線上に右上がりに並ぶ）
- $r = -1$：完全な負の相関（すべての点が一直線上に右下がりに並ぶ）
- $r = 0$：直線的な相関関係がない（無相関）
