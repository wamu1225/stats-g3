    <h1>連続型確率分布</h1>
    <p>このモジュールで学ぶこと

前のモジュールで学んだ離散型確率変数では、期待値  や分散  を「確率 × 値の和」で計算しました。連続型でも同じ概念が使われます——違いは、確率の計算が足し算から積分に変わる点だけです。

「サイコロの目は1〜6の整数しかとらないが、人間の身長は165.3cmや170.1cmなど小数点以下の値もとる」——この違いが離散型と連続型確率変数の本質的な差です。連続型では「ちょうど165.000...cmになる確率」は0であり、「165cm以上170cm以下の確率」というように区間で確率を考えます。このモジュールでは確率密度関数（PDF）と、最も重要な連続型分布である正規分布・標準化を学びます。大数の法則と中心極限定理は次のモジュールで扱います。

確率密度関数（PDF）と累積分布関数（CDF）

離散型確率変数では「 になる確率」  のように特定の値の確率が意味を持...</p>
