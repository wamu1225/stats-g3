    <h1>連続型確率分布</h1>
    <p>💡 **このモジュールで学ぶこと**

「サイコロの目は1〜6の整数しかとらないが、人間の身長は165.3cmや170.1cmなど小数点以下の値もとる」——この違いが離散型と連続型確率変数の本質的な差です。連続型では「ちょうど165.000...cmになる確率」は0であり、「165cm以上170cm以下の確率」というように区間で確率を考えます。身長・気温・待ち時間など連続データの確率計算に不可欠な正規分布と指数分布を、直感的なイメージとともに習得しましょう。

---

### 1. 確率密度関数（PDF）と累積分布関数（CDF）

離散型確率変数では「$X = 3$ になる確率」 $P(X=3)$ のように特定の値の確率が意味を持ちます。一方、連続型確率変数では「ちょうど165.000...cmになる確率」は0です。なぜなら実数の直線上で特定の1点は長さ0の区間だからです。

そこで連続型では「ある区間に入る確率」を**確率密度関数（PDF: Probability Density Function）** $f(x)$ を使って積分で求めます。
