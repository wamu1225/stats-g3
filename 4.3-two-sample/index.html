    <p>💡 **このモジュールで学ぶこと**

「新しい教授法を受けたクラスと従来の教授法のクラスで、テストの平均点に差があるか？」——2つのグループの平均を比較するとき、まず「2つのグループの分散（ばらつき）が等しいか」を確認する必要があります。これが**F検定**です。その結果によって使うべき**2標本t検定**の種類が変わります。2標本問題の全体像を、ステップごとに理解しましょう。

### 1. F検定：2つの母分散が等しいかを確認する

2つの独立した標本 $X_1, \ldots, X_{n_1}$（クラスA）と $Y_1, \ldots, Y_{n_2}$（クラスB）がそれぞれ正規分布 $N(\mu_1, \sigma_1^2)$、$N(\mu_2, \sigma_2^2)$ に従うとします。

帰無仮説 $H_0: \sigma_1^2 = \sigma_2^2$（2つの母分散は等しい）を検定するために使う統計量が**F統計量**です：

F = \frac{s_1^2}{s_2^2} \sim F(n_1-1,\, n_2-1)
