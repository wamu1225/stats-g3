    <h1>確率の基礎</h1>
    <p>💡 **このモジュールで学ぶこと**

Chapter 1 では平均・標準偏差・相関係数など、手元のデータを「記述する」方法を学びました。しかし実際のデータには必ずばらつきがあります——この**不確実性を数値化する**のが確率論です。「サイコロを振るとき、3以下が出る可能性はどれくらい？」——この素朴な疑問から確率の世界は始まります。日常会話では「たぶん」「おそらく」と曖昧に使う「可能性」を、0から1の数値として厳密に定義・計算するのが確率論です。具体的な例（サイコロ・コイン・トランプ）を使いながら、確率の定義と計算規則をしっかり身につけましょう。

---

### 1. 確率の基本概念：標本空間・事象・確率の定義

サイコロを1回振る実験を考えます。出る目は必ず1〜6のどれかです。このような「起こりうるすべての結果の集合」を**標本空間**（$\Omega$）といいます。サイコロなら $\Omega = \{1, 2, 3, 4, 5, 6\}$ です。
