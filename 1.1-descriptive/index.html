    <h1>データの整理と要約</h1>
    <p>💡 **このモジュールで学ぶこと**

「クラス30人の試験結果を集めました。何から読み取ればいいでしょうか？」——データが手元に揃ったとき、最初にするべきことは「整理して要約する」ことです。平均・中央値・分散などの基本統計量は、大量のデータを数個の数値に圧縮し、全体の特徴を素早く把握するための道具です。データ分析のあらゆる場面でこれらの統計量は登場するため、意味と計算方法をしっかり身につけましょう。

---

### 1. 代表値：平均・中央値・最頻値

会社の年収データを例に考えてみましょう。10人の社員の年収が「300, 320, 340, 350, 360, 380, 390, 400, 420, 2000（万円）」だとします。最後の1人だけ突出して高い、いわゆる**外れ値**（他の値から極端に離れたデータ点）です。

このデータの代表値を3種類で計算すると：

- **平均（mean）**：全員の年収を足して人数で割る。外れ値2000万円に引っ張られ、平均は約426万円——実態より大幅に高くなります。
