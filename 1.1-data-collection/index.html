    <h1>データの収集と実験・観察</h1>
    <p>💡 **このモジュールで学ぶこと**

分析の第一歩は「正しいアプローチでデータを集める」ことです。どんなに高度な計算をしても、集めたデータ自体が偏っていれば（バイアス）、間違った結論に導かれます。統計検定3級では、母集団から正しく標本を選ぶ考え方と、因果関係を見極めるための実験のルールが問われます。

---

### 1. 全数調査と標本調査

テレビの視聴率や内閣支持率を調べるとき、全国の全ての人に毎日アンケートを取ることは不可能です。このように、対象となる全員をすべて調べることを**全数調査**（悉皆調査）といいます。国勢調査が代表例ですが、時間とコストが膨大にかかります。

現実的に多く行われるのが、対象の一部だけを抽出して調べる**標本調査**です（例：テレビの視聴率、世論調査）。
対象全体の集団を**母集団**（population）、そこから調べ出し抽出された一部を**標本**（sample）と呼びます。

標本に基づいて母集団の姿を予測するには、標本が母集団の性質を偏りなく代表している必要があります。意図的に標本を選ぶと偏り（バイアス）が生じるため、くじ引きのように...</p>
