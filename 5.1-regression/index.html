    <h1>回帰分析</h1>
    <p>💡 **このモジュールで学ぶこと**

「広告費を1万円増やすと売上は何円増えるか？」——このような「Xが1単位増えたときYがどれだけ変化するか」という予測の問いに答えるのが**回帰分析**です。散布図上の点にできるだけ近い直線を引き、その直線の式を使って予測するイメージです。単回帰モデルの構造・最小二乗法による係数の推定・決定係数による当てはまりの評価という3つのステップを順に学びましょう。


---

### 1. 単回帰モデル：直線で関係を定式化する

ある会社の月次データとして「広告費 $X$（万円）」と「売上 $Y$（万円）」の12か月分のデータがあるとします。散布図を描くと右上がりの傾向が見えますが、点は直線上にぴったり乗るわけではありません。各月ごとに天候・競合他社の動向など広告費以外の要因があるからです。

**単回帰モデル**は「広告費で説明できる部分（回帰直線）」と「説明できない個体ごとのばらつき（誤差項）」に分けて考えます。
