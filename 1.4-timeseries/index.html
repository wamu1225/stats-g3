    <h1>時系列データと変化の読み方</h1>
    <p>このモジュールで学ぶこと

「今月の売上は先月より10万円増えた——これは良いことか？」単純な増減だけでは判断できないことがあります。例えば12月は毎年売上が増える（季節変動）かもしれないし、長期的には下落トレンドかもしれません。時系列データとは「時間の順序を持つデータ」のことで、その読み方には通常のデータ分析とは異なる工夫が必要です。このモジュールでは、時系列グラフの読み取り、移動平均による平滑化、指数の使い方を学びます。

時系列データとは：時間順序を持つデータ

時系列データとは、同一の対象について時間の経過とともに繰り返し測定したデータです。株価・気温・GDP・人口など、時間とともに変化する多くの現象が時系列データです。

時系列データの特徴：
順序に意味がある：データは時間順に並んでおり、並べ替えると意味が失われる
隣接する観測値が関連しやすい：昨日の気温と今日の気温には関連があ...</p>
